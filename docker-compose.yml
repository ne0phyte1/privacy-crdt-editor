# ============================================================
# Docker Compose 编排文件
# 服务: frontend (Nginx + React), backend (Express + Yjs WebSocket)
# ============================================================

services:
  # ---- 后端服务（仅通过 Docker 内部网络暴露，不对外开端口）----
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: privacy-crdt-backend
    restart: unless-stopped
    # 不对外暴露端口；nginx 通过内部网络 app_network 代理到 backend:3001
    expose:
      - "3001"
    volumes:
      # 持久化 Y.Doc 数据和 SQLite（如有）
      - backend_data:/app/data
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- 前端服务 (Nginx 静态文件 + 反向代理) ----
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # 前端构建时注入的环境变量
        VITE_API_BASE: /api
        VITE_WS_BASE: /ws
    container_name: privacy-crdt-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

volumes:
  backend_data:
    driver: local

networks:
  app_network:
    driver: bridge
